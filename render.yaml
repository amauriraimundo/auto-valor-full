# render.yaml — deploy AutoValor proxy to Render (free tier)
# ─────────────────────────────────────────────────────────────
# 1. Push this repo to GitHub
# 2. Go to https://dashboard.render.com → New → Web Service
# 3. Connect your repo — Render auto-detects this file
# 4. Click "Deploy" — done. Your URL will be:
#    https://autovalor-proxy.onrender.com
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: autovalor-proxy
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        value: "*"
    healthCheckPath: /api/health
